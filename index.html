<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMDNA</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">SMDNA</div>
        <nav class="nav">
            <a href="#" class="nav-item active">Spotify大盘</a>
        </nav>
    </aside>

    <main class="content">
        <h1>Spotify Global 大盘查询</h1>
        <p class="subtitle">输入日期，查询该日 Spotify Global Top 200 播放量总和</p>

        <div class="query-box">
            <input type="date" id="dateInput" value="2024-01-01">
            <button id="queryBtn">查询</button>
        </div>

        <div id="result" class="result hidden">
            <div class="result-label">大盘数值</div>
            <div class="result-value" id="resultValue">--</div>
            <div class="result-date" id="resultDate"></div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
